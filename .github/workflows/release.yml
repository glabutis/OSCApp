name: Build & Release

on:
  push:
    tags:
      - "v*"   # triggers on v0.1.0, v1.2.3, etc.

permissions:
  contents: write  # needed to create the GitHub Release and upload assets

jobs:

  # ── Linux AppImage (x86_64 + aarch64) ───────────────────────────────────────
  build-linux:
    name: Build Linux AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libglib2.0-0 \
            libdbus-1-3 \
            fuse \
            libfuse2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name Dispatch \
            --noconfirm \
            --onedir \
            --collect-all PySide6 \
            --collect-all pynput \
            --collect-all Xlib \
            --icon assets/icon.png \
            main.py

      - name: Download appimagetool
        run: |
          mkdir -p .build-tools
          curl -fsSL -o .build-tools/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage
          chmod +x .build-tools/appimagetool

      - name: Assemble AppDir
        run: |
          APPDIR="dist/Dispatch.AppDir"
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/Dispatch/. "$APPDIR/usr/bin/"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Dispatch" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/Dispatch.desktop" <<EOF
          [Desktop Entry]
          Name=Dispatch
          Exec=Dispatch
          Icon=Dispatch
          Type=Application
          Categories=Utility;
          Comment=Map slide remote keystrokes to OSC commands
          EOF

          cp assets/icon.png "$APPDIR/Dispatch.png"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          .build-tools/appimagetool dist/Dispatch.AppDir "dist/Dispatch-${VERSION}-${{ matrix.arch }}.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: dist/Dispatch-*-${{ matrix.arch }}.AppImage

  # ── macOS DMG ───────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-14   # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate .icns icon
        run: |
          iconutil -c icns assets/Dispatch.iconset -o assets/icon.icns

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name Dispatch \
            --noconfirm \
            --onedir \
            --windowed \
            --osx-bundle-identifier com.dispatch.Dispatch \
            --collect-all PySide6 \
            --collect-all pynput \
            --icon assets/icon.icns \
            main.py

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          create-dmg \
            --volname "Dispatch" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Dispatch.app" 150 185 \
            --hide-extension "Dispatch.app" \
            --app-drop-link 450 185 \
            "dist/Dispatch-${VERSION}.dmg" \
            "dist/Dispatch.app" \
          || true  # create-dmg exits non-zero even on success sometimes

          # Fallback to hdiutil if create-dmg didn't produce the file
          if [[ ! -f "dist/Dispatch-${VERSION}.dmg" ]]; then
            STAGING=$(mktemp -d)
            cp -R dist/Dispatch.app "$STAGING/"
            ln -s /Applications "$STAGING/Applications"
            hdiutil create \
              -volname "Dispatch" \
              -srcfolder "$STAGING" \
              -ov -format UDZO \
              "dist/Dispatch-${VERSION}.dmg"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: macos-dmg
          path: dist/Dispatch-*.dmg

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          name: "Dispatch ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → pre-release
          files: |
            artifacts/linux-appimage-x86_64/*.AppImage
            artifacts/linux-appimage-aarch64/*.AppImage
            artifacts/macos-dmg/*.dmg
          body: |
            ## Install

            **macOS** — download the `.dmg`, open it, drag Dispatch to Applications.
            > First launch: right-click → Open to bypass Gatekeeper.

            **Linux** — download the `.AppImage` for your architecture, then:
            ```bash
            chmod +x Dispatch-*.AppImage
            ./Dispatch-*.AppImage
            ```
